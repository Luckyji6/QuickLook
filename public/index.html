<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickLook - Photo Screening Tool</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👀</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <button id="menu-btn" class="menu-btn" aria-label="Menu">⋯</button>
      <div id="menu-dropdown" class="menu-dropdown hidden">
        <div class="menu-section">
          <button data-lang="en" class="menu-item">EN</button>
          <button data-lang="zh" class="menu-item">中文</button>
        </div>
        <div class="menu-divider"></div>
        <button id="btn-update" class="menu-item" data-i18n="update"></button>
        <button id="btn-uninstall" class="menu-item danger" data-i18n="uninstall"></button>
      </div>
    </div>

    <div id="dir-picker" class="panel hidden">
      <h1>QuickLook</h1>
      <p class="subtitle" data-i18n="subtitle"></p>
      <button id="dir-pick-btn" class="btn-pick" data-i18n="selectDir"></button>
      <div id="dir-fallback" class="dir-fallback">
        <p class="fallback-label" data-i18n="orEnterPath"></p>
        <div class="dir-input-wrap">
          <input type="text" id="dir-input" data-i18n-placeholder="dirPlaceholder" />
          <button id="dir-confirm" data-i18n="open"></button>
        </div>
      </div>
      <p class="hint"><span data-i18n="hint"></span></p>
    </div>

    <div id="main-panel" class="panel hidden">
      <header class="header">
        <h1>QuickLook</h1>
        <div class="header-actions">
          <span id="selected-count" class="badge"></span>
          <button id="btn-copy" class="btn-primary" disabled data-i18n="batchCopy"></button>
        </div>
      </header>
      <div id="loading" class="loading" data-i18n="loadingPhotos"></div>
      <div id="date-groups" class="date-groups"></div>
    </div>

    <div id="preview-panel" class="panel hidden">
      <div class="preview-toolbar">
        <span id="preview-info">1 / 100</span>
        <div class="preview-toolbar-center">
          <span id="preview-selected-count" class="preview-selected-count"></span>
          <button id="btn-copy-preview" class="btn-primary" disabled data-i18n="batchCopy"></button>
        </div>
        <span id="preview-selected" class="selected-indicator" data-i18n="selected"></span>
        <button id="btn-exit-preview" data-i18n="exit"></button>
      </div>
      <div class="preview-content">
        <img id="preview-img" src="" alt="Preview" />
      </div>
      <div class="preview-footer">
        <div id="preview-load-bar" class="preview-load-bar hidden">
          <div class="preview-load-fill"></div>
        </div>
        <div class="preview-footer-row">
          <div id="preview-exif" class="preview-exif"></div>
          <div class="preview-hint" data-i18n="previewHint"></div>
        </div>
      </div>
    </div>

    <div id="update-progress" class="update-progress hidden">
      <div class="update-progress-bar"><div id="update-progress-fill" class="update-progress-fill"></div></div>
      <p id="update-progress-text" class="update-progress-text"></p>
    </div>

    <div id="copy-modal" class="modal hidden">
      <div class="modal-content">
        <h2 data-i18n="copyModalTitle"></h2>
        <p id="copy-modal-desc"></p>
        <div id="copy-picker-wrap">
          <button id="copy-pick-target" class="btn-pick" data-i18n="selectTargetDir"></button>
        </div>
        <div id="copy-input-wrap" class="dir-fallback hidden">
          <p class="fallback-label" data-i18n="orEnterTarget"></p>
          <div class="dir-input-wrap">
            <input type="text" id="copy-target-dir" data-i18n-placeholder="targetPlaceholder" />
            <button id="copy-confirm" data-i18n="startCopy"></button>
          </div>
        </div>
        <div id="copy-progress" class="copy-progress hidden">
          <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
          <p id="progress-text"></p>
        </div>
        <button id="copy-close" class="btn-secondary" data-i18n="close"></button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.js"></script>
  <script src="i18n.js"></script>
  <script src="thumbCache.js"></script>
  <script src="app.js"></script>
</body>
</html>
